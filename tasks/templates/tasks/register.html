{% extends "tasks/base.html" %}

{% block content %}

<div style="display:flex; justify-content:center; align-items:center; margin-top:80px;">

<div style="
background:white;
color:#1f2937;
padding:40px;
border-radius:12px;
width:320px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
">

<h2 style="text-align:center; margin-bottom:25px;">Create Account</h2>

{% if error %}
<p style="color:red; text-align:center; margin-bottom:15px;">
{{ error }}
</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<label style="font-size:14px;">Username</label>

<input
type="text"
name="username"
style="
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #e5e7eb;
border-radius:6px;
">

<label style="font-size:14px;">Password</label>

<input
type="password"
name="password"
style="
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #e5e7eb;
border-radius:6px;
">

<label style="font-size:14px;">Confirm Password</label>

<input
type="password"
name="confirm_password"
style="
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:20px;
border:1px solid #e5e7eb;
border-radius:6px;
">

<button
type="submit"
style="
width:100%;
padding:12px;
background:#22c55e;
color:white;
border:none;
border-radius:8px;
font-weight:500;
cursor:pointer;
">

Register

</button>

</form>

<div style="text-align:center; margin-top:20px; font-size:14px;">

<a href="/" style="color:#4f46e5; text-decoration:none;">Back to Home</a>

</div>

</div>

</div>

{% endblock %}
