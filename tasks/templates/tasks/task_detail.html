{% extends "tasks/base.html" %}

{% block content %}

<div style="max-width:800px;margin:60px auto;">

<div style="
background:white;
color:#1f2937;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
">

<h2 style="margin-bottom:20px;">{{ task.title }}</h2>

<div style="margin-bottom:25px;">

<p><strong>Status:</strong> {{ task.status }}</p>
<p><strong>Priority:</strong> {{ task.priority }}</p>
<p><strong>Deadline:</strong> {{ task.deadline }}</p>

</div>

<h3 style="margin-bottom:10px;">Notes</h3>

<form method="POST">

{% csrf_token %}

<textarea
name="notes"
placeholder="Write additional notes for this task..."
style="
width:100%;
height:160px;
padding:12px;
border-radius:8px;
border:1px solid #e5e7eb;
font-size:14px;
resize:vertical;
"
>{{ task.notes|default_if_none:"" }}</textarea>

<br><br>

<button
type="submit"
style="
background:#4f46e5;
color:white;
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:500;
">

Save Notes

</button>

<a
href="/dashboard/"
style="
margin-left:15px;
text-decoration:none;
color:#6b7280;
font-size:14px;
">

Back to Dashboard

</a>

</form>

</div>

</div>

{% endblock %}
