<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Your Tasks</h1>

<a href="/logout/">Logout</a>
<br><br>

<a href="/create-task/">Create New Task</a>
<br><br>

<table border="1">
    <tr>
        <th>Title</th>
        <th>Status</th>
        <th>Priority</th>
        <th>Deadline</th>
    </tr>

    {% for task in tasks %}
    <tr>
        <td>{{ task.title }}</td>
        <td>{{ task.status }}</td>
        <td>{{ task.priority }}</td>
        <td>{{ task.deadline }}</td>
        <a href="/edit-task/{{ task.id }}/">Edit</a><br>
        <br>
        <a href="/delete-task/{{ task.id }}/" onclick="return confirm('Are you sure you want to delete this task?');">
        Delete
        </a>
    </td>
    </tr>
    {% endfor %}

</table>

<br>

<a href="/">Home</a>

</body>
</html>
